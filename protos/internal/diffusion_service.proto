//PNB: Diffusion model implemementation related (2025.12.19)

syntax = "proto3";
package infaas.internal;

message DiffusionRequest {
  string prompt        = 1;
  string model         = 2;
  int32  steps         = 3;
  float  guidanceScale = 4;
  int32  seed          = 5;
  int32  width         = 6;
  int32  height        = 7;
  string input_text = 8;
}

message DiffusionReply {
  bytes image_png = 1;
  string image_path = 2;
  string status = 3;
  string error_msg = 4;
}

service DiffusionService {
  rpc Generate(DiffusionRequest) returns (DiffusionReply);
}
